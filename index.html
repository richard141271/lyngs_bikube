<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Biekoloni – MVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2f5f2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <div id="app">
    <header id="ui-header">
      <div id="stats-bar">
        <div class="stat-item" title="Penger">💰 <span id="money">0</span></div>
        <div class="stat-item" title="Score">🏆 <span id="score">0</span></div>
        <div class="stat-item" title="Honning">🍯 <span id="totalHoney">0</span></div>
        <div class="stat-item" title="Kuber">🐝 <span id="activeHives">0</span></div>
      </div>
      <!-- Hidden elements to maintain compatibility with existing JS logic -->
      <div style="display:none">
        <div id="ui"></div> <!-- Dummy target for any legacy selectors -->
        <span id="highScore">0</span>
        <span id="selBees">0</span>
        <span id="selHoney">0</span>
        <span id="selLarvae">0</span>
        <div id="title">Biekoloni</div>
      </div>
    </header>

    <main id="game-container">
      <canvas id="game" width="960" height="600"></canvas>
    </main>

    <footer id="ui-footer">
      <button id="btnEstablish" disabled>Etabler</button>
      <button id="btnSwarm" disabled>Sverm</button>
      <button id="btnSell" disabled>Selg</button>
      <button id="btnRestart" title="Restart">↺</button>
      <button id="btnInstall" style="display:none">Installer</button>
    </footer>
  </div>
  
  <script src="map.js"></script>
  <script src="bees.js"></script>
  <script src="game.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
